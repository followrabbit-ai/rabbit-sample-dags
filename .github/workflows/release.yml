name: Release & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  deploy:
    name: deploy-to-composer
    needs: release-please
    if: |
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_COMPOSER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Detect Composer PyPI changes
        id: pypi_diff
        run: |
          set -euo pipefail
          # gcloud composer environments update --update-pypi-packages-from-file
          # rebuilds the worker image (~15-25 min). Only run when the file
          # actually changed since the previous release tag.
          current_tag=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
          if [[ -n "$current_tag" ]]; then
            prev_tag=$(git tag --sort=-version:refname | grep -vx "$current_tag" | head -n 1 || true)
          else
            prev_tag=$(git tag --sort=-version:refname | head -n 1 || true)
          fi
          if [[ -z "$prev_tag" ]]; then
            echo "No previous tag found; will sync PyPI deps."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "reason=no previous tag" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$prev_tag" HEAD -- requirements-composer.txt; then
            echo "requirements-composer.txt unchanged since $prev_tag; skipping PyPI sync."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "reason=unchanged since $prev_tag" >> "$GITHUB_OUTPUT"
          else
            echo "requirements-composer.txt changed since $prev_tag; will sync."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "reason=changed since $prev_tag" >> "$GITHUB_OUTPUT"
          fi

      - name: Import DAGs and plugins into Composer
        run: |
          set -euo pipefail
          DAG_PREFIX=$(gcloud composer environments describe \
            "${{ vars.COMPOSER_ENV_NAME }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --location="${{ vars.COMPOSER_LOCATION }}" \
            --format='value(config.dagGcsPrefix)')
          PLUGIN_PREFIX="${DAG_PREFIX%/dags}/plugins"
          echo "Uploading dags/* -> $DAG_PREFIX/"
          gcloud storage cp --recursive dags/* "$DAG_PREFIX/"
          echo "Uploading plugins/* -> $PLUGIN_PREFIX/"
          gcloud storage cp --recursive plugins/* "$PLUGIN_PREFIX/"

      - name: Verify DAG and plugin objects in GCS
        id: gcs_verify
        run: |
          set -euo pipefail
          DAG_PREFIX=$(gcloud composer environments describe \
            "${{ vars.COMPOSER_ENV_NAME }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --location="${{ vars.COMPOSER_LOCATION }}" \
            --format='value(config.dagGcsPrefix)')
          PLUGIN_PREFIX="${DAG_PREFIX%/dags}/plugins"
          DAG_OBJECT="${DAG_PREFIX}/bigquery_elt_demo.py"
          PLUGIN_OBJECT="${PLUGIN_PREFIX}/rabbit_bq_optimizer_plugin.py"
          echo "Verifying DAG object exists: $DAG_OBJECT"
          gcloud storage objects describe "$DAG_OBJECT" --format='value(name)'
          echo "Verifying plugin object exists: $PLUGIN_OBJECT"
          gcloud storage objects describe "$PLUGIN_OBJECT" --format='value(name)'

      - name: Sync Composer PyPI deps
        if: steps.pypi_diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "Applying requirements-composer.txt to ${{ vars.COMPOSER_ENV_NAME }} (may take 15-25 min)..."
          gcloud composer environments update "${{ vars.COMPOSER_ENV_NAME }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --location="${{ vars.COMPOSER_LOCATION }}" \
            --update-pypi-packages-from-file=requirements-composer.txt

      - name: Summarize deploy
        if: always()
        run: |
          {
            echo "### Cloud Composer deploy"
            echo
            echo "- Environment: \`${{ vars.COMPOSER_ENV_NAME }}\` (\`${{ vars.COMPOSER_LOCATION }}\`)"
            echo "- Project: \`${{ vars.GCP_PROJECT_ID }}\`"
            echo "- Service account: \`${{ vars.GCP_COMPOSER_SA }}\`"
            if [[ "${{ steps.pypi_diff.outputs.changed }}" == "true" ]]; then
              echo "- PyPI deps: re-synced from \`requirements-composer.txt\` (${{ steps.pypi_diff.outputs.reason }})"
            else
              echo "- PyPI deps: skipped (${{ steps.pypi_diff.outputs.reason }})"
            fi
            echo "- GCS verify (DAG + plugin objects): \`${{ steps.gcs_verify.outcome }}\`"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "- Trigger: manual (workflow_dispatch)"
            else
              echo "- Trigger: release \`${{ needs.release-please.outputs.tag_name }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
