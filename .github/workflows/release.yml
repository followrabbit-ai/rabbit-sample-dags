name: Release & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  deploy:
    name: deploy-to-composer
    needs: release-please
    if: |
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.release-please.outputs.release_created == 'true'
      )
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_COMPOSER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Import DAGs into Composer
        run: |
          gcloud composer environments storage dags import \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --location="${{ vars.COMPOSER_LOCATION }}" \
            --environment="${{ vars.COMPOSER_ENV_NAME }}" \
            --source=dags/

      - name: Summarize deploy
        if: always()
        run: |
          {
            echo "### Cloud Composer deploy"
            echo
            echo "- Environment: \`${{ vars.COMPOSER_ENV_NAME }}\` (\`${{ vars.COMPOSER_LOCATION }}\`)"
            echo "- Project: \`${{ vars.GCP_PROJECT_ID }}\`"
            echo "- Service account: \`${{ vars.GCP_COMPOSER_SA }}\`"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "- Trigger: manual (workflow_dispatch)"
            else
              echo "- Trigger: release \`${{ needs.release-please.outputs.tag_name }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
